<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Login – Landscape Database System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #2d5a27 0%, #3a7d20 60%, #7abb57 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', Arial, sans-serif;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .login-card {
      background: #fff; border-radius: 18px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.22);
      padding: 42px 40px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { font-size: 36px; margin-bottom: 6px; }
    .login-logo h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: #3a7d20; margin-bottom: 4px; }
    .login-logo p { font-size: 12px; color: #999; }
    .login-field { margin-bottom: 18px; }
    .login-field label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #6a9050; margin-bottom: 6px; }
    .login-field input { width: 100%; padding: 11px 14px; border-radius: 8px; border: 1.5px solid #ddd; font-size: 14px; font-family: inherit; outline: none; }
    .login-field input:focus { border-color: #7abb57; }
    .login-btn { width: 100%; padding: 13px; background: #3a7d20; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; margin-top: 4px; font-family: 'Nunito', sans-serif; }
    .login-btn:hover { background: #2e6318; }
    .login-err { background: #fde8e8; color: #c0392b; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 600; text-align: center; margin-top: 14px; }
    .login-back { text-align: center; margin-top: 20px; }
    .login-back a { font-size: 13px; color: #999; text-decoration: none; }
    .login-back a:hover { color: #3a7d20; }
    .login-creds { background: #f4f9f0; border-radius: 8px; padding: 12px 14px; margin-bottom: 20px; font-size: 12px; color: #666; line-height: 1.7; }
    .login-creds strong { color: #3a7d20; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon">🌿</div>
        <h1>Landscape Database System</h1>
        <p>Manager Access Portal</p>
      </div>

      <div class="login-creds">
        <strong>Demo Credentials:</strong><br>
        Username: <strong>manager</strong> &nbsp;/&nbsp; Password: <strong>ae2024!</strong><br>
        Username: <strong>admin</strong> &nbsp;/&nbsp; Password: <strong>admin123</strong>
      </div>

      {% if error %}
      <div class="login-err">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="login-field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Enter username" autocomplete="username" required/>
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="login-btn">Log In to Dashboard</button>
      </form>

      <div class="login-back">
        <a href="/">← Back to A &amp; E Website</a>
      </div>
    </div>
  </div>
</body>
</html>
